<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Cyberpunk Funcional</title>
    <link rel="stylesheet" href="estyle-form.css">
</head>
<body>
<header>
    <div class="p-1">
        <div class="p-5">
            <a href="index.html">◄Voltar</a>
        </div>
        <div class="p-2">
            <h1 class="p-3">SUA OPINIÃO</h1>
            <p class="p-4">Deixe sua marca digital</p>
        </div>
        <div style="width: 100px;" class="div-rec-rec"></div>
    </div>
</header>

<main class="p1">
    <form class="p2">
        
        <div class="p3">
            <h2 class="p4"><span class="p5">01 //</span> COMO VOCÊ AVALIA ESTA OBRA? <span class="p6">*</span></h2>
            
            <label class="p7">
                <input type="radio" name="avaliacao" value="incrivel" class="p8">
                <div class="p9">
                    <span class="p10"></span>
                    <span class="p11">★★★★★</span>
                    <span class="p12">INCRÍVEL</span>
                </div>
            </label>

            <label class="p7">
                <input type="radio" name="avaliacao" value="otimo" class="p8"> <div class="p9">
                    <span class="p10"></span>
                    <span class="p11">★★★★☆</span>
                    <span class="p12">ÓTIMO</span>
                    <span class="p13"></span>
                </div>
            </label>

            <label class="p7">
                <input type="radio" name="avaliacao" value="bom" class="p8">
                <div class="p9">
                    <span class="p10"></span>
                    <span class="p11">★★★☆☆</span>
                    <span class="p12">BOM</span>
                </div>
            </label>

            <label class="p7">
                <input type="radio" name="avaliacao" value="regular" class="p8">
                <div class="p9">
                    <span class="p10"></span>
                    <span class="p11">★★☆☆☆</span>
                    <span class="p12">REGULAR</span>
                </div>
            </label>

            <label class="p7">
                <input type="radio" name="avaliacao" value="pode_melhorar" class="p8">
                <div class="p9">
                    <span class="p10"></span>
                    <span class="p11">★☆☆☆☆</span>
                    <span class="p12">PODE MELHORAR</span>
                </div>
            </label>
        </div>

        <div class="p3">
            <h2 class="p4 p14"><span class="p5 p15">02 //</span> O QUE VOCÊ SENTIU AO LER? <span class="p6">*</span></h2>
            
            <div class="p16">
                <label class="p17">
                    <input type="radio" name="sentimento" value="emocionado" class="p18">
                    <div class="p19">
                        <span class="p20">♥</span>
                        <span class="p21">EMOCIONADO</span>
                        <span class="p22"></span>
                    </div>
                </label>

                <label class="p17">
                    <input type="radio" name="sentimento" value="inspirado" class="p18">
                    <div class="p19">
                        <span class="p20">↑</span>
                        <span class="p21">INSPIRADO</span>
                        <span class="p22"></span>
                    </div>
                </label>

                <label class="p17">
                    <input type="radio" name="sentimento" value="pensativo" class="p18">
                    <div class="p19">
                        <span class="p20">~</span>
                        <span class="p21">PENSATIVO</span>
                        <span class="p22"></span>
                    </div>
                </label>

                <label class="p17">
                    <input type="radio" name="sentimento" value="surpreso" class="p18"> <div class="p19">
                        <span class="p20">!</span>
                        <span class="p21">SURPRESO</span>
                        <span class="p22"></span>
                    </div>
                </label>

                <label class="p17">
                    <input type="radio" name="sentimento" value="nostalgico" class="p18">
                    <div class="p19">
                        <span class="p20">◌</span>
                        <span class="p21">NOSTÁLGICO</span>
                        <span class="p22"></span>
                    </div>
                </label>
            </div>
        </div>

        <div class="p3">
            <h2 class="p4 p23"><span class="p5 p24">03 //</span> SEU NOME (OPCIONAL)</h2>
            <input type="text" class="p25" placeholder="leitor_anônimo_42">
        </div>

        <div class="p3">
            <h2 class="p4 p26"><span class="p5 p27">04 //</span> DEIXE UMA MENSAGEM</h2>
            <div class="p28">
                <textarea class="p29" placeholder="escreva aqui sua impressão sobre os poemas..."></textarea>
                <span class="p30">0/300</span>
            </div>
        </div>

        <button type="submit" class="p31">
            <span class="p32">▶</span> TRANSMITIR OPINIÃO
        </button>

    </form>
</main>

<footer>
    <p class="s-1">CONCEITO // FRONT-END PROJETO FINAL</p>
</footer>
</body>
</html>
