<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="pág.css">
</head>
<body>
    <main>
        <h2>ENVIE SEU VERSO NO ESPAÇO</h2>
        <p class="sub-form">Deixe sua poesia ou desabafo gravado nos pixels deste universo.</p>
        
        <form action="#" method="POST">
            <div class="campo-grupo">
                <input type="text" id="nome" name="nome" placeholder="Seu codinome / pseudônimo" required>
            </div>
            
            <div class="campo-grupo">
                <input type="email" id="email" name="email" placeholder="Seu e-mail intergaláctico" required>
            </div>
            
            <div class="campo-grupo">
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite seus versos aqui..." required></textarea>
            </div>
            
            <button type="submit" class="btn-enviar">TRANSMITIR POESIA</button>
        </form>
    </div>
</section>
   </main>
    
</body>
</html>
